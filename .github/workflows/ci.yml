name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bun run check-types

      - name: Build & zip (Chrome MV3)
        run: bun run zip
        env:
          WXT_BASE_CLIENT_URI: ${{ vars.WXT_BASE_CLIENT_URI }}
          WXT_BASE_SERVER_URI: ${{ vars.WXT_BASE_SERVER_URI }}
