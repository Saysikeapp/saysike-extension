name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bun run check-types

      - name: Build & zip (Chrome MV3)
        run: bun run zip
        env:
          WXT_BASE_CLIENT_URI: ${{ vars.WXT_BASE_CLIENT_URI }}
          WXT_BASE_SERVER_URI: ${{ vars.WXT_BASE_SERVER_URI }}

      - name: Dry-run submit (Chrome Web Store)
        # Only runs on the release-please PR branch
        if: startsWith(github.ref, 'refs/heads/release-please--')
        run: |
          VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          bunx wxt submit --dry-run \
            --chrome-zip .output/saysike-extension-${VERSION}-chrome.zip
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
