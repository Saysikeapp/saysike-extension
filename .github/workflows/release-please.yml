name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # When the Release PR is created/updated: dry-run the store submission to
      # catch credential or zip issues before the real publish runs.
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.pr }}

      - uses: oven-sh/setup-bun@v2
        if: ${{ steps.release.outputs.pr }}
        with:
          bun-version: "1.3.8"

      - name: Install deps
        if: ${{ steps.release.outputs.pr }}
        run: bun install --frozen-lockfile

      - name: Build & zip (Chrome MV3)
        if: ${{ steps.release.outputs.pr }}
        run: bun run zip

      - name: Dry-run submit (Chrome Web Store)
        if: ${{ steps.release.outputs.pr }}
        run: |
          VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          bunx wxt submit --dry-run \
            --chrome-zip .output/saysike-extension-${VERSION}-chrome.zip
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

      # When a release is created: trigger the publish workflow.
      # publish.yml uses 'release: published' but GITHUB_TOKEN events don't fire
      # cross-workflow, so we dispatch it explicitly here instead.
      - name: Trigger publish
        if: ${{ steps.release.outputs.release_created }}
        run: gh workflow run publish.yml --ref ${{ steps.release.outputs.tag_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
